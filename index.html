<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="FX Tracker" />
  <title>USD / AUD Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --bg2: #f4f4f2;
      --bg3: #ebebea;
      --text: #1a1a18;
      --text2: #6b6b68;
      --text3: #9e9e9a;
      --border: rgba(0,0,0,0.1);
      --radius: 10px;
      --up: #1D9E75;
      --down: #D85A30;
      --avg: #EF9F27;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1c1c1a;
        --bg2: #2a2a27;
        --bg3: #333330;
        --text: #f0f0ee;
        --text2: #9e9e9a;
        --text3: #6b6b68;
        --border: rgba(255,255,255,0.1);
      }
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      padding: env(safe-area-inset-top, 16px) 16px env(safe-area-inset-bottom, 16px);
      max-width: 480px;
      margin: 0 auto;
    }

    header {
      padding: 24px 0 20px;
      border-bottom: 0.5px solid var(--border);
      margin-bottom: 20px;
    }

    header h1 {
      font-size: 26px;
      font-weight: 500;
      letter-spacing: -0.5px;
    }

    header p {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: var(--text3);
      margin-top: 4px;
      letter-spacing: 0.06em;
    }

    .metric-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 16px;
    }

    .metric {
      background: var(--bg2);
      border-radius: var(--radius);
      padding: 14px 16px;
    }

    .metric.current {
      grid-column: span 2;
    }

    .metric-label {
      font-size: 11px;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 6px;
    }

    .metric-value {
      font-family: 'DM Mono', monospace;
      font-size: 20px;
      font-weight: 500;
      color: var(--text);
    }

    .metric.current .metric-value {
      font-size: 36px;
    }

    .metric-delta {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      margin-top: 4px;
    }

    .up { color: var(--up); }
    .down { color: var(--down); }
    .neutral { color: var(--text3); }

    .gauge-section {
      margin-bottom: 20px;
    }

    .gauge-labels {
      display: flex;
      justify-content: space-between;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--text3);
      margin-bottom: 8px;
    }

    .gauge-track {
      position: relative;
      height: 8px;
      background: var(--bg3);
      border-radius: 4px;
    }

    .gauge-fill {
      height: 100%;
      border-radius: 4px;
      background: linear-gradient(90deg, #D85A30 0%, #EF9F27 45%, #1D9E75 100%);
      transition: width 0.9s cubic-bezier(.4,0,.2,1);
    }

    .gauge-marker {
      position: absolute;
      top: -5px;
      width: 2px;
      height: 18px;
      background: var(--text);
      border-radius: 1px;
      transform: translateX(-50%);
      transition: left 0.9s cubic-bezier(.4,0,.2,1);
    }

    .gauge-marker::after {
      content: attr(data-val);
      position: absolute;
      top: 22px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
    }

    .chart-section {
      margin-bottom: 20px;
    }

    .chart-title {
      font-size: 11px;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .legend-dot {
      width: 10px;
      height: 3px;
      border-radius: 2px;
    }

    .chart-wrap {
      position: relative;
      width: 100%;
      height: 200px;
    }

    .status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding-top: 12px;
      border-top: 0.5px solid var(--border);
      font-size: 12px;
      color: var(--text3);
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--text3);
      flex-shrink: 0;
    }

    .dot.live {
      background: var(--up);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.35; }
    }

    .refresh-btn {
      margin-left: auto;
      font-size: 12px;
      font-family: 'DM Sans', sans-serif;
      color: var(--text2);
      background: none;
      border: 0.5px solid var(--border);
      border-radius: 8px;
      padding: 5px 12px;
      cursor: pointer;
    }

    .refresh-btn:active { opacity: 0.6; }

    .spacer { height: 36px; }
  </style>
</head>
<body>

  <header>
    <h1>USD / AUD</h1>
    <p id="updated-ts">Loading…</p>
  </header>

  <div class="metric-grid">
    <div class="metric current">
      <div class="metric-label">Current rate</div>
      <div class="metric-value" id="m-current">—</div>
      <div class="metric-delta" id="m-delta">—</div>
    </div>
    <div class="metric">
      <div class="metric-label">30d low</div>
      <div class="metric-value" id="m-low">—</div>
    </div>
    <div class="metric">
      <div class="metric-label">30d average</div>
      <div class="metric-value" id="m-avg">—</div>
    </div>
    <div class="metric" style="grid-column: span 2;">
      <div class="metric-label">30d high</div>
      <div class="metric-value" id="m-high">—</div>
    </div>
  </div>

  <div class="gauge-section">
    <div class="gauge-labels">
      <span id="g-low">—</span>
      <span>30-day range</span>
      <span id="g-high">—</span>
    </div>
    <div class="gauge-track">
      <div class="gauge-fill" id="gauge-fill" style="width: 0%"></div>
      <div class="gauge-marker" id="gauge-marker" style="left: 0%" data-val=""></div>
    </div>
    <div style="height: 32px;"></div>
  </div>

  <div class="chart-section">
    <div class="chart-title">
      30-day history
      <span class="legend-item"><span class="legend-dot" style="background:#1D9E75;"></span> rate</span>
      <span class="legend-item"><span class="legend-dot" style="background:#EF9F27; border-top: 1px dashed #EF9F27; height:0; display:inline-block; width:12px;"></span> avg</span>
    </div>
    <div class="chart-wrap">
      <canvas id="fx-chart" role="img" aria-label="30-day USD to AUD exchange rate line chart">30-day rate history.</canvas>
    </div>
  </div>

  <div class="status-bar">
    <div class="dot" id="status-dot"></div>
    <span id="status-text">Fetching data…</span>
    <button class="refresh-btn" onclick="loadFX()">Refresh</button>
  </div>

  <div class="spacer"></div>

  <script>
    let fxChart = null;

    async function loadFX() {
      document.getElementById('status-text').textContent = 'Fetching live data…';
      document.getElementById('status-dot').className = 'dot';

      try {
        const end = new Date();
        const start = new Date();
        start.setDate(start.getDate() - 30);
        const fmt = d => d.toISOString().split('T')[0];

        const res = await fetch(`https://api.frankfurter.app/${fmt(start)}..${fmt(end)}?from=USD&to=AUD`);
        if (!res.ok) throw new Error('API error');
        const data = await res.json();

        const dates = Object.keys(data.rates).sort();
        const rates = dates.map(d => data.rates[d].AUD);

        const current = rates[rates.length - 1];
        const prev = rates[rates.length - 2] || current;
        const low = Math.min(...rates);
        const high = Math.max(...rates);
        const avg = rates.reduce((a, b) => a + b, 0) / rates.length;
        const pct = (current - prev) / prev * 100;
        const pos = ((current - low) / (high - low) * 100).toFixed(1);

        document.getElementById('m-current').textContent = current.toFixed(4);
        document.getElementById('m-low').textContent = low.toFixed(4);
        document.getElementById('m-avg').textContent = avg.toFixed(4);
        document.getElementById('m-high').textContent = high.toFixed(4);

        const deltaEl = document.getElementById('m-delta');
        deltaEl.textContent = `${pct >= 0 ? '+' : ''}${pct.toFixed(3)}% vs yesterday`;
        deltaEl.className = 'metric-delta ' + (pct > 0.001 ? 'up' : pct < -0.001 ? 'down' : 'neutral');

        document.getElementById('g-low').textContent = low.toFixed(4);
        document.getElementById('g-high').textContent = high.toFixed(4);
        document.getElementById('gauge-fill').style.width = pos + '%';
        const marker = document.getElementById('gauge-marker');
        marker.style.left = pos + '%';
        marker.setAttribute('data-val', current.toFixed(4));

        document.getElementById('updated-ts').textContent =
          'Updated ' + new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        document.getElementById('status-dot').className = 'dot live';
        document.getElementById('status-text').textContent = `${dates.length} trading days loaded`;

        const isDark = matchMedia('(prefers-color-scheme: dark)').matches;
        const gridColor = isDark ? 'rgba(255,255,255,0.07)' : 'rgba(0,0,0,0.06)';
        const textColor = isDark ? 'rgba(255,255,255,0.45)' : 'rgba(0,0,0,0.4)';

        if (fxChart) fxChart.destroy();
        fxChart = new Chart(document.getElementById('fx-chart'), {
          type: 'line',
          data: {
            labels: dates.map(d => d.slice(5)),
            datasets: [
              {
                label: 'USD/AUD',
                data: rates.map(r => parseFloat(r.toFixed(4))),
                borderColor: '#1D9E75',
                borderWidth: 2,
                pointRadius: 0,
                pointHoverRadius: 5,
                tension: 0.3,
                fill: true,
                backgroundColor: isDark ? 'rgba(29,158,117,0.08)' : 'rgba(29,158,117,0.06)',
              },
              {
                label: '30d avg',
                data: dates.map(() => parseFloat(avg.toFixed(4))),
                borderColor: '#EF9F27',
                borderWidth: 1.5,
                borderDash: [5, 4],
                pointRadius: 0,
                tension: 0,
                fill: false,
              }
            ]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            interaction: { mode: 'index', intersect: false },
            plugins: {
              legend: { display: false },
              tooltip: {
                callbacks: {
                  label: ctx => `${ctx.dataset.label}: ${ctx.parsed.y.toFixed(4)}`
                }
              }
            },
            scales: {
              x: {
                ticks: { color: textColor, font: { family: 'DM Mono', size: 10 }, maxTicksLimit: 7, maxRotation: 0 },
                grid: { color: gridColor }
              },
              y: {
                ticks: { color: textColor, font: { family: 'DM Mono', size: 10 }, callback: v => v.toFixed(3) },
                grid: { color: gridColor }
              }
            }
          }
        });

      } catch (e) {
        document.getElementById('status-text').textContent = 'Failed to load — check connection';
        document.getElementById('status-dot').className = 'dot';
        console.error(e);
      }
    }

    loadFX();
  </script>

</body>
</html>
